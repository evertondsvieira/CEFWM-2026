<!doctype html>
<html class="no-js" lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Layout Responsivo com BS5</title>
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>
  <div class="d-flex flex-column min-vh-100 text-center">
    <nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <button class="navbar-toggler" type="button" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </nav>

    <main class="flex-grow-1">
      <div class="p-5 my-4 mx-2 bg-body-tertiary rounded-3">
        <div class="container-fluid py-4">
          <h1 class="display-5 fw-bold">Contador</h1>
          <p class="lead fw-medium">Utilize os botões abaixo para registrar uma contagem.</p>
        </div>
      </div>

      <div class="d-grid d-md-flex justify-content-md-center gap-1 mx-2">
        <button type="button" class="btn btn-success order-1 order-md-2"><i class="bi bi-plus-circle-fill"></i> 1</button>
        <button type="button" class="btn btn-danger order-2 order-md-1"><i class="bi bi-dash-circle-fill"></i> 1</button>
      </div>

      <p class="display-5 fw-bold mt-4">0</p>
    </main>

    <footer class="text-center p-2 bg-secondary bg-opacity-10 fst-italic text-black text-opacity-50">
      Copyright © 2026 Everton Da Silva Vieira
    </footer>
  </div>

  <script src="js/app.js"></script>
  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
